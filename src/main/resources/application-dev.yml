
spring:
  datasource:
    url: jdbc:h2:mem:smartparkdb
    driverClassName: org.h2.Driver
    username: ${USERNAME_DB:test-username}
    password: ${PASSWORD_DB:test-password}
    generate-unique-name: false
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

jwt:
  access:
    secret: ${JWT_ACCESS_SECRET:test-jwt-secret}
    expiration: ${JWT_ACCESS_EXPIRATION:86400000}
    issuer: drenzo-andrei